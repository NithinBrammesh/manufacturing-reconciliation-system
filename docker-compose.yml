services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_HEAP_OPTS: "-Xms32m -Xmx64m"
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      - kafka
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...' &&
        until kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          echo 'Kafka not ready, waiting...'
          sleep 3
        done &&
        echo 'Creating topics...' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic aoi1-topic --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic spi1-topic --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic aoi2-topic --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic spi2-topic --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic fcr2-topic --partitions 1 --replication-factor 1 &&

        echo 'All topics created successfully.' &&
        kafka-topics --bootstrap-server kafka:9092 --list
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    volumes:
      - ./flink/flink-conf.dev.yaml:/opt/flink/conf/flink-conf.yaml
      - ./flink-jobs:/opt/flink/jobs
      - ./flink-lib/flink-connector-kafka-3.0.2-1.18.jar:/opt/flink/lib/flink-connector-kafka-3.0.2-1.18.jar
      - ./flink-lib/kafka-clients-3.5.1.jar:/opt/flink/lib/kafka-clients-3.5.1.jar

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 2
    volumes:
      - ./flink/flink-conf.dev.yaml:/opt/flink/conf/flink-conf.yaml
      - ./flink-jobs:/opt/flink/jobs
      - ./flink-lib/flink-connector-kafka-3.0.2-1.18.jar:/opt/flink/lib/flink-connector-kafka-3.0.2-1.18.jar
      - ./flink-lib/kafka-clients-3.5.1.jar:/opt/flink/lib/kafka-clients-3.5.1.jar


  flink-job-submitter:
    image: manufacturing-reconciliation-system-flink-jobmanager
    container_name: flink-job-submitter
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
      - kafka-init
      - redis
    command: >
      bash -c "
        echo 'Waiting for JobManager to be ready...' &&
        until curl -sf http://flink-jobmanager:8081/overview | grep -q 'taskmanagers'; do
          echo 'JobManager not ready, retrying in 5s...'
          sleep 5
        done &&
        echo 'Waiting for TaskManager to register...' &&
        until curl -sf http://flink-jobmanager:8081/overview | grep -v '\"taskmanagers\":0' | grep -q 'taskmanagers'; do
          echo 'No TaskManagers yet, retrying in 5s...'
          sleep 5
        done &&
        echo 'Giving Kafka topics 15 seconds to be fully ready...' &&
        sleep 15 &&
        echo 'All systems ready. Submitting PyFlink job...' &&
        flink run -m flink-jobmanager:8081 -py /opt/flink/jobs/pyflink_reconciliation.py &&
        echo 'Job submitted successfully!'
      "
    volumes:
      - ./flink-jobs:/opt/flink/jobs
      - ./flink-lib/flink-connector-kafka-3.0.2-1.18.jar:/opt/flink/lib/flink-connector-kafka-3.0.2-1.18.jar
      - ./flink-lib/kafka-clients-3.5.1.jar:/opt/flink/lib/kafka-clients-3.5.1.jar
    restart: "no"

  flask-api:
    image: python:3.11-slim
    container_name: flask-api
    depends_on:
      - redis
    volumes:
      - ./flask-api:/app
    working_dir: /app
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install flask redis flask-cors --quiet &&
               python app.py"

  nodered:
    image: nodered/node-red
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./nodered-data:/data
      - ./real-data:/real-data
    
  flink-watchdog:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-watchdog
    depends_on:
      - redis
    entrypoint: ["python", "-u"]
    command: ["/opt/flink/jobs/watchdog.py"]
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - flask-api
    restart: unless-stopped

  flink-aggregation:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-aggregation
    depends_on:
      - redis
    entrypoint: ["python", "-u"]
    command: ["/opt/flink/jobs/aggregation_service.py"]
    volumes:
      - ./flink-jobs:/opt/flink/jobs
    restart: unless-stopped